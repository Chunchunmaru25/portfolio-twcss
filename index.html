<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./public/svg/portfolio.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>portfolio</title>
  <style>
    body {
      margin: 0;
      padding: 0;
    }

    #loading {
      background-color: #1e1e2f;
      position: fixed;
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      z-index: 9998;
      display: flex;
      color: #c5c6c7;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      cursor: progress;
    }

    #loading-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    @media (max-width: 768px) {
      #loading-content {
        transform: translate(-50%, -50%) scale(0.7);
      }
    }

    @media (max-width: 480px) {
      #loading-content {
        transform: translate(-50%, -50%) scale(0.5);
      }
    }

    .hidden {
      display: none;
    }

    .opacity {
      opacity: 0;
    }

    .terminal-wrapper {
      background-color: #0f0f1f;
      border-radius: 10px;
      width: 600px;
      max-width: 90%;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .terminal-wrapper :hover {
      cursor: progress;
    }

    .terminal-header {
      background-color: #1a1a2e;
      padding: 8px 12px;
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .red-dot {
      background-color: #ff5f56;
    }

    .yellow-dot {
      background-color: #ffbd2e;
    }

    .green-dot {
      background-color: #27c93f;
    }

    .terminal {
      padding: 20px;
      min-height: 300px;
      overflow-y: auto;
    }

    .line {
      display: block;
      white-space: pre-wrap;
      margin: 4px 0;
    }

    .green {
      color: #00ff6a;
    }

    .blue {
      color: #00c0ff;
    }

    .muted {
      color: #aaaaaa;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      background-color: #c5c6c7;
      margin-left: 2px;
      animation: blink 1s infinite;
    }

    @keyframes blink {

      0%,
      50%,
      100% {
        opacity: 1;
      }

      25%,
      75% {
        opacity: 0;
      }
    }

    @keyframes flick {

      0%,
      50%,
      100% {
        opacity: 1;
      }

      25%,
      75% {
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <div id="loading">
    <div id="loading-content">
      <div class="terminal-wrapper">
        <div class="terminal-header">
          <span class="dot red-dot"></span>
          <span class="dot yellow-dot"></span>
          <span class="dot green-dot"></span>
        </div>
        <div class="terminal" id="terminal"></div>
      </div>
    </div>
  </div>
  <div id="root" class="opacity hidden"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark')
    }
  </script>

  <script>
    const loading = document.getElementById('loading');
    const terminal = document.getElementById("terminal");
    const root = document.getElementById('root')
    let isLoaded = false;
    let isFlickerStarted = false;

    const terminalLines = [
      { type: "typing", text: "> npm create clarence/portfolio@latest" },
      { type: "span", text: "✔ Loading assets.", color: "green" },
      { type: "span", text: "✔ Setting up projects.", color: "green" },
      { type: "span", text: "✔ Verifying experience.", color: "green" },
      { type: "span", text: "✔ Checking contact info.", color: "green" },
      { type: "span", text: "✔ Preparing animations.", color: "green" },
      { type: "span", text: "✔ Finalizing layout.", color: "green" },
      { type: "span", text: "✔ Applying themes.", color: "green" },
      { type: "span", text: "✔ Optimizing performance.", color: "green" },
      { type: "span", text: "ℹ Portfolio assets ready.", color: "blue" },
      { type: "typing", text: "Success! Portfolio is ready.", color: "muted" },
      { type: "flicker", text: "Redirecting to home", color: "muted" },
    ];

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function TypingText(text, color) {
      const span = document.createElement('span');
      span.classList.add('line');
      if (color) span.classList.add(color);

      const cursor = document.createElement('span');
      cursor.classList.add('cursor');

      terminal.appendChild(span);
      span.appendChild(cursor);

      for (let char of text) {
        cursor.insertAdjacentText('beforebegin', char);
        await wait(30);
      }

      cursor.remove();
    }

    async function SpanText(text, color) {
      const span = document.createElement('span');
      span.classList.add('line');
      if (color) span.classList.add(color);

      span.innerHTML = text;
      await wait(30);
      terminal.appendChild(span);
    }

    async function FlickerText(text, color) {
      const span = document.createElement('span');
      span.classList.add('line');
      if (color) span.classList.add(color);

      terminal.appendChild(span);

      let dots = 0;

      setInterval(() => {
        span.textContent = text + " " + ".".repeat(dots);
        dots = (dots + 1) % 4;
      }, 500);

      isFlickerStarted = true;
      setTimeout(() => {
        checkReady();
      }, 1000)
    }

    async function RunTerminal(terminalLines) {
      for (const element of terminalLines) {
        if (element.type === 'typing') {
          await TypingText(element.text, element.color);
        }
        else if (element.type === 'span') {
          await SpanText(element.text, element.color);
        }
        else if (element.type === 'flicker') {
          await FlickerText(element.text, element.color);
        }
      }
    }
    function checkReady() {
      if (isLoaded && isFlickerStarted) {
        root.style.display = 'block';
        loading.style.transition = 'opacity 1000ms ease';
        loading.style.opacity = '0';
        setTimeout(() => {
          loading.style.display = 'none';
        }, 1000)
        setTimeout(() => {
          root.style.transition = 'opacity 1s ease';
          root.style.opacity = '1';
        }, 1000);
      }
    }

    RunTerminal(terminalLines)

    window.addEventListener('load', () => {
      loading.style.cursor = 'default'
      isLoaded = true;
      checkReady();
    });
  </script>
</body>

</html>
